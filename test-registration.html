<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Registration</title>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status { padding: 15px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .form { display: flex; flex-direction: column; gap: 15px; }
        .input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .button { padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test Registration Directly</h1>
        
        <div class="status" id="api-status">
            <h3>Testing Backend Connection...</h3>
        </div>
        
        <form class="form" onsubmit="testRegistration(event)">
            <input type="text" id="name" placeholder="Name" class="input" required><br>
            <input type="email" id="email" placeholder="Email" class="input" required><br>
            <input type="text" id="shopName" placeholder="Shop Name" class="input" required><br>
            <input type="text" id="phone" placeholder="Phone" class="input"><br>
            <input type="password" id="password" placeholder="Password" class="input" required><br>
            <button type="submit" class="button">Test Registration</button>
        </form>
        
        <div id="result"></div>
    </div>

    <script>
        async function testRegistration(event) {
            event.preventDefault();
            
            const statusDiv = document.getElementById('api-status');
            const resultDiv = document.getElementById('result');
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const shopName = document.getElementById('shopName').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            
            if (!name || !email || !password || !shopName) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '<h3>❌ Please fill all required fields</h3>';
                return;
            }
            
            statusDiv.className = 'status';
            statusDiv.innerHTML = '<h3>🔄 Testing registration...</h3>';
            
            try {
                const response = await fetch('https://inventiq-backend-4.onrender.com/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, email, password, shopName, language: 'hindi', phone })
                });
                
                const data = await response.json();
                
                if (response._id) {
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = '<h3>✅ Registration Successful!</h3>';
                    resultDiv.innerHTML = `
                        <div class="status success">
                            <h4>🎉 User Created Successfully!</h4>
                            <p><strong>ID:</strong> ${data._id}</p>
                            <p><strong>Name:</strong> ${data.name}</p>
                            <p><strong>Email:</strong> ${data.email}</p>
                            <p><strong>Shop:</strong> ${data.shopName}</p>
                            <p><strong>Token:</strong> ${data.token}</p>
                        </div>
                    `;
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '<h3>❌ Registration Failed</h3>';
                    resultDiv.innerHTML = `
                        <div class="status error">
                            <h4>❌ Error: ${data.message}</h4>
                            <p><strong>Details:</strong> ${JSON.stringify(data, null, 2)}</p>
                        </div>
                    `;
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '<h3>❌ Connection Error</h3>';
                resultDiv.innerHTML = `
                    <div class="status error">
                        <h4>❌ Error: ${error.message}</h4>
                        <p>Check browser console for more details</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
